defaults:
  - config
  - _self_

exp_name: "quickstart"
seed: 0

env:
  id: "InvertedPendulum-v5"
  num_envs: 1

training:
  total_steps: 90000
  steps_per_chunk: 10000
  checkpoint_every_steps: 2000
  eval_every_steps: 2000
  eval_episodes: 5
  log_every_steps: 500
  log_episode_every: 5

  # Best checkpoint tracking
  save_best_train: true
  train_best_min_delta: 5.0

  # Training-based early rollback (hybrid approach)
  train_rollback_check: true
  train_rollback_drop: 10.0
  train_rollback_patience: 3

method:
  name: "fixed_h20"
  uncertainty_metric: "next_obs_mean_l2"
  thresh_high: 0.20
  thresh_mid: 0.08

eval:
  checkpoint_path: ""
  episodes: 5
  record_video: false
  video_dir: "runs/quickstart/videos"
  video_fps: 30
