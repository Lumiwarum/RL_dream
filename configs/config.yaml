# ── Run identity ──────────────────────────────────────────────────────────────
exp_name: "default"
seed: 0
device: "cuda"

# ── Environment ───────────────────────────────────────────────────────────────
env:
  id: "Hopper-v4"
  num_envs: 8
  eval_num_envs: 5
  action_repeat: 1

# ── Buffer ────────────────────────────────────────────────────────────────────
buffer:
  batch_size: 16
  batch_length: 64
  max_size: 1000000
  device: ${device}
  storage_device: "cpu"

# ── Trainer ───────────────────────────────────────────────────────────────────
trainer:
  steps: 500000
  pretrain: 1
  train_ratio: 512
  eval_every: 10000
  eval_episodes: 5
  log_every: 5000
  checkpoint_every: 10000       # save latest.pt every N env steps; 0 = eval-only
  save_latest: true
  save_best: true
  best_min_delta: 0.0           # improvement needed before replacing best.pt
  save_periodic: false          # also keep step_<N>.pt snapshots
  action_repeat: ${env.action_repeat}
  batch_size: ${buffer.batch_size}
  batch_length: ${buffer.batch_length}

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  runs_dir: "runs"
  tb_subdir: "tb"
  ckpt_subdir: "checkpoints"

# ── Thesis features ───────────────────────────────────────────────────────────
model:
  ensemble_size: 1            # 1=baseline, 2=thesis ensemble
  ensemble_avg_rewards: false  # average reward across WMs during imagination
  imag_horizon: 15            # fixed horizon when adaptive.enabled=false

adaptive:
  enabled: false
  horizons: [10, 15, 20]     # [H_low, H_mid, H_high]
  thresh_high: 0.27           # ema_obs_loss > this → H_low  (calibrated for Hopper)
  thresh_mid: 0.20            # ema_obs_loss > this → H_mid
  ema_alpha: 0.003
  ema_init: 2.0               # high → always start at H_low until WM quality improves

# ── DreamerV3 core hyperparameters ────────────────────────────────────────────
act_entropy: 3e-4
kl_free: 1.0
horizon: 333                  # discount horizon (γ = 1 - 1/horizon ≈ 0.997)
lamb: 0.95                    # TD-λ mixing coefficient
compile: false                # set true on Linux for torch.compile speedup
log_grads: false

lr: 4e-5
agc: 0.3
pmin: 1e-3
eps: 1e-20
beta1: 0.9
beta2: 0.999
warmup: 1000
slow_target_update: 1
slow_target_fraction: 0.02

loss_scales:
  recon: 1.0
  rew: 1.0
  con: 1.0
  dyn: 1.0
  rep: 0.1
  policy: 1.0
  value: 1.0
  repval: 0.3

# ── RSSM ──────────────────────────────────────────────────────────────────────
rssm:
  stoch: 32
  deter: 512
  hidden: 512
  discrete: 32
  img_layers: 2
  obs_layers: 1
  dyn_layers: 1
  blocks: 8
  act: "SiLU"
  norm: true
  unimix_ratio: 0.01
  initial: "learned"
  device: ${device}

# ── Encoder ───────────────────────────────────────────────────────────────────
encoder:
  mlp_keys: "obs"
  cnn_keys: "^$"
  mlp:
    shape: null
    layers: 3
    units: 512
    act: "SiLU"
    norm: true
    device: ${device}
    outscale: null
    symlog_inputs: true
    name: "mlp_encoder"
  cnn:
    act: "SiLU"
    norm: true
    kernel_size: 5
    minres: 4
    depth: 16
    mults: [2, 3, 4, 4]

# ── Decoder ───────────────────────────────────────────────────────────────────
decoder:
  mlp_keys: "obs"
  cnn_keys: "^$"
  mlp_dist:
    name: "symlog_mse"
  cnn_dist:
    name: "mse"
  mlp:
    shape: null
    layers: 3
    units: 512
    act: "SiLU"
    norm: true
    dist:
      name: "identity"
    device: ${device}
    outscale: 1.0
    symlog_inputs: false
    name: "mlp_decoder"
  cnn:
    depth: 16
    units: 512
    bspace: 8
    mults: [2, 3, 4, 4]
    act: "SiLU"
    norm: true
    kernel_size: 5
    minres: 4
    outscale: 1.0

# ── Reward head ───────────────────────────────────────────────────────────────
reward:
  shape: [255]
  layers: 1
  units: 512
  act: "SiLU"
  norm: true
  dist:
    name: "symexp_twohot"
    bin_num: 255
  outscale: 0.0
  device: ${device}
  symlog_inputs: false
  name: "reward"

# ── Continue head ─────────────────────────────────────────────────────────────
cont:
  shape: [1]
  layers: 1
  units: 512
  act: "SiLU"
  norm: true
  dist:
    name: "binary"
  outscale: 1.0
  device: ${device}
  symlog_inputs: false
  name: "cont"

# ── Actor ─────────────────────────────────────────────────────────────────────
actor:
  shape: null
  layers: 3
  units: 512
  act: "SiLU"
  norm: true
  device: ${device}
  dist:
    cont:
      name: "bounded_normal"
      min_std: 0.1
      max_std: 1.0
    disc:
      name: "onehot"
      unimix_ratio: 0.01
    multi_disc:
      name: "multi_onehot"
      unimix_ratio: 0.01
  outscale: 0.01
  symlog_inputs: false
  name: "actor"

# ── Critic ────────────────────────────────────────────────────────────────────
critic:
  shape: [255]
  layers: 3
  units: 512
  act: "SiLU"
  norm: true
  device: ${device}
  dist:
    name: "symexp_twohot"
    bin_num: 255
  outscale: 0.0
  symlog_inputs: false
  name: "value"

# ── Hydra ─────────────────────────────────────────────────────────────────────
hydra:
  run:
    dir: ${paths.runs_dir}/${exp_name}
  output_subdir: .hydra
  job:
    chdir: false
