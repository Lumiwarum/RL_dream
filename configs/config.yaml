# Base config. Use --config <name> to load other experiment yaml files.

exp_name: "default"

seed: 0
deterministic: true
device: "cuda"   # set "cpu" if needed

env:
  id: "InvertedPendulum-v5"
  num_envs: 1
  action_repeat: 1

replay:
  capacity: 500000
  seq_len: 16
  batch_size: 512

world_model:
  ensemble_size: 2
  obs_dim: null          # auto-filled from env at runtime
  act_dim: null          # auto-filled
  latent_dim: 64
  deter_dim: 256
  hidden_dim: 512
  kl_beta: 1.0
  lr: 3e-4
  grad_clip: 100.0

agent:
  actor_hidden: 256
  critic_hidden: 256
  actor_lr: 3e-4
  critic_lr: 3e-4
  entropy_coef: 1e-3
  discount: 0.99
  lambda_: 0.95

method:
  name: "fixed_h20"  # fixed_h5 | fixed_h15 | fixed_h20 | adaptive_5_10_20
  # adaptive horizon selection thresholds based on uncertainty scalar
  # if uncertainty > high -> H=5
  # elif uncertainty > mid -> H=10
  # else -> H=20
  uncertainty_metric: "next_obs_mean_l2"  # latent_mean_l2 | next_obs_mean_l2 | gaussian_kl
  thresh_high: 0.25
  thresh_mid: 0.10

imagination:
  horizon_fixed: 20          # used for fixed baselines (e.g., fixed_h15)
  horizons: [10]      # adaptive candidates
  batch_horizon_decision: "per_batch"  # (kept simple) choose one horizon per training batch
  rollout_batch: 512
  gamma: 0.99
  lambda_: 0.95

training:
  total_steps: 90000
  steps_per_chunk: 30000
  resume: false
  start_learning: 2000
  actor_start_step: 3000
  collect_per_step: 4
  update_every: 4
  updates_per_step: 1
  log_every_steps: 200
  eval_every_steps: 100
  checkpoint_every_steps: 5000
  log_episode_every: 10
  best_min_delta: 1.0
  rollback_drop: 10.0
  rollback_patience: 2
  min_steps_before_rollback: 100
  rollback_lr_scale: 1.0

eval:
  checkpoint_path: ""
  episodes: 5
  record_video: false
  video_dir: "runs/default/videos"
  video_fps: 30

paths:
  runs_dir: "runs"
  ckpt_dirname: "checkpoints"
  tb_dirname: "tb"
  videos_dirname: "videos"

hydra:
  run:
    dir: ${paths.runs_dir}/${exp_name}
  output_subdir: .hydra
  job:
    chdir: false
