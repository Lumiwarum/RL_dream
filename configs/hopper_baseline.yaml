defaults:
  - config
  - _self_

exp_name: "hopper_baseline"
seed: 0

env:
  id: "Hopper-v5"
  num_envs: 1

training:
  total_steps: 1000000
  steps_per_chunk: 200000
  start_learning: 5000
  checkpoint_every_steps: 10000
  log_every_steps: 2000

method:
  name: "fixed_h15"

imagination:
  horizon_fixed: 15

agent:
  # entropy_coef=1e-2: now effective after no_grad caching bug was fixed in trainer.py.
  # log_std ceiling is +0.5 (std≤1.65) in actor_critic.py, so this won't cause entropic explosion.
  entropy_coef: 1e-2

  # Penalises atanh(mean)² (raw pre-tanh MLP output); fixed from mean² which had near-zero
  # gradient at tanh saturation (Jacobian ≈ 0.009 at mean=0.99).
  pretanh_reg_coef: 1e-3
