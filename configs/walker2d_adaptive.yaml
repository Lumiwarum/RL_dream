defaults:
  - config
  - _self_

exp_name: "walker2d_adaptive"
seed: 0

env:
  id: "Walker2d-v4"
  num_envs: 1

training:
  total_steps: 1000000
  steps_per_chunk: 200000
  start_learning: 5000
  checkpoint_every_steps: 10000
  log_every_steps: 2000

method:
  name: "adaptive_5_10_20"
  uncertainty_metric: "latent_mean_l2"
  thresh_high: 0.35
  thresh_mid: 0.15

imagination:
  horizons: [5, 10, 20]
